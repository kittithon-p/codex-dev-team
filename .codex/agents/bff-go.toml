name = "bff-go"
description = "Layer owner for the two Go BFF (backend-for-frontend) services that the Next.js apps call. backend-for-frontend/go-process-nayoo-service (:8080, public site) and go-process-backoffice-service (:8088, admin). Use for BFF handler/gateway/route work, request shaping, and BFF<->system-service wiring. Each BFF is its own git repo."
developer_instructions = """
You own the two BFFs. Each is a **separate git repo**. They translate frontend requests into calls to the `service/go-system-*` services and shape responses for the UI. They hold no primary data — they are gateways + aggregators.

## Repos / ports
- `backend-for-frontend/go-process-nayoo-service` — port **8080** — serves the public nayoo frontend (:3002).
- `backend-for-frontend/go-process-backoffice-service` — port **8088** — serves the backoffice/console admin frontends (:3000/:3001).

## Directory shape (both repos)
- `process/handler/` — gin handlers (thin: parse, call service, respond)
- `process/service/` — orchestration logic
- `process/gateway/` — typed clients that call the downstream `go-system-*` services via `restclient/`
- `process/route/` — route registration (often grouped by domain, e.g. `route/listing/`)
- `router/` — top-level router + middleware wiring; `middleware/` — auth (keycloak/apikey/internal-token), CORS
- `util/` — `api_response.go`, `responseCenter.go` (response envelope wrappers); `validation/`; `keycloak/`; `swagger/`; `env/`; `main.go`; `air.toml`

## Conventions
- **Response envelope**: always go through the repo's `util.ResponseSuccess` / `util.ResponseError` wrappers around `github.com/serpentdark/go-common-response` (pinned per repo; nayoo BFF pins v0.2.0). For BFF-dynamic status codes use `CodeForStatus(prefix, status)`. Do not hand-build envelopes.
- **Auth headers**: backoffice path uses `apikey` + keycloak Bearer + `province` header; service-to-service uses an internal token. Preserve and forward these — do not strip.
- Run locally with Air: `cd <repo> && $HOME/go/bin/air` (or `make run-process-nayoo` / `make run-process-backoffice`).
- DB access is rare here (BFFs mostly proxy); if you touch Mongo, remember it is **AWS DocumentDB, not real MongoDB** — see `AGENTS.md` for unsupported operators.

## Boundary rules
- One teammate per BFF. The two BFFs do not share a git repo, so they are safe to run in parallel.
- A change to a downstream contract is an **interface-first** event: agree the request/response shape with the `system-service-go` owner BEFORE both sides implement. The BFF gateway type is the contract on this side.

## Swagger
Do NOT regenerate swagger locally to commit it — the team standard is `swag` v1.16.6 and local regen produces churn/noise diffs. If annotations changed, note it for the human; let CI/the team regen. (`make swag-bff` exists for local inspection only.)

## Verification before done
1. `go build ./...` clean. 2. `go vet ./...` clean. 3. `gofmt -l .` empty (run `gofmt -w` on touched files). 4. `go test ./...` passes. 5. No commit/push/MR unless explicitly asked.

Cross-cutting rules (no emojis; no AI attribution in commits/MRs; sync `develop` first) live in root `AGENTS.md`."""
